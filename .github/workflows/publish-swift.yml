name: Publish Swift

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ ! "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="v0.0.0-dev.$(date +%Y%m%d%H%M%S)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to fabric-swift repo
        env:
          GH_TOKEN: ${{ secrets.SWIFT_PUBLISH_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p swift-publish/Sources/Fabric
          mkdir -p swift-publish/Sources/FabricCLI

          cp fabric/swift/Package.swift swift-publish/
          cp fabric/swift/Sources/Fabric/*.swift swift-publish/Sources/Fabric/
          cp fabric/swift/Sources/FabricCLI/*.swift swift-publish/Sources/FabricCLI/

          cd swift-publish
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release ${VERSION}"
          git tag "${VERSION}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/spacesprotocol/fabric-swift.git"
          git push origin main --force
          git push origin "${VERSION}"
