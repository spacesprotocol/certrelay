name: Extract code snippets

on:
  push:
    tags:
      - "fabric-v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine versions
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/fabric-v* ]]; then
            echo "version=${GITHUB_REF_NAME#fabric-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=latest" >> "$GITHUB_OUTPUT"
          fi
          # Pull libveritas version from what we actually depend on
          LV_VERSION=$(grep 'libveritas-jvm:[0-9]' fabric/kotlin/build.gradle.kts | head -1 | sed 's/.*:\([0-9][^"]*\).*/\1/')
          echo "lv_version=$LV_VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract snippets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          LV_VERSION="${{ steps.version.outputs.lv_version }}"

          # Replace version placeholders in example files
          find fabric/examples -type f \( -name "*.rs" -o -name "*.mjs" -o -name "*.go" -o -name "*.py" -o -name "*.kt" -o -name "*.swift" \) \
            -exec sed -i "s|{{VERSION}}|$VERSION|g" {} + && \
          find fabric/examples -type f \( -name "*.rs" -o -name "*.mjs" -o -name "*.go" -o -name "*.py" -o -name "*.kt" -o -name "*.swift" \) \
            -exec sed -i "s|{{LV_VERSION}}|$LV_VERSION|g" {} +

          cd fabric/examples
          mkdir -p /tmp/snippets

          for lang_file in \
            rust/src/main.rs \
            js/index.mjs \
            go/main.go \
            python/example.py \
            kotlin/Example.kt \
            swift/Example.swift; do

            lang=$(dirname "$lang_file" | cut -d/ -f1)
            mkdir -p "/tmp/snippets/$lang"
            ./extract-snippets.sh "$lang_file" "/tmp/snippets/$lang"
          done

          # Create index
          echo "# Code Snippets" > /tmp/snippets/index.md
          echo "" >> /tmp/snippets/index.md
          for lang in rust js go python kotlin swift; do
            echo "## $lang" >> /tmp/snippets/index.md
            for f in /tmp/snippets/$lang/*.txt; do
              name=$(basename "$f" .txt)
              echo "- [$name]($lang/$name.txt)" >> /tmp/snippets/index.md
            done
            echo "" >> /tmp/snippets/index.md
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/snippets

  deploy:
    needs: extract
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
